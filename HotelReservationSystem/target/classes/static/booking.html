<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Grandeur - Book Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏨 Hotel Grandeur</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms.html" class="active">Rooms</a></li>
            <li><a href="bookings.html">My Bookings</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <main style="max-width: 600px;">
        <h1 class="mb-2">Book Room</h1>
        
        <div class="card p-2" style="padding: 2rem;">
            <p id="roomInfo" class="mb-2" style="font-size: 1.2rem; font-weight: 500; color: var(--primary-color);">Loading room info...</p>
            
            <form id="bookingForm" onsubmit="submitBooking(event)">
                <div class="filter-group mb-1">
                    <label>Customer Name *</label>
                    <input type="text" id="b-name" required>
                </div>
                <div class="filter-group mb-1">
                    <label>Email *</label>
                    <input type="email" id="b-email" required>
                </div>
                <div class="filter-group mb-1">
                    <label>Phone Number *</label>
                    <input type="tel" id="b-phone" required pattern="[0-9]{10}">
                </div>
                <div class="filter-group mb-1">
                    <label>Check-in Date *</label>
                    <input type="date" id="b-checkin" required onchange="calculateNights()">
                </div>
                <div class="filter-group mb-1">
                    <label>Check-out Date *</label>
                    <input type="date" id="b-checkout" required onchange="calculateNights()">
                </div>
                <div class="filter-group mb-2">
                    <label>Number of Guests *</label>
                    <input type="number" id="b-guests" min="1" value="1" required>
                </div>
                
                <div id="costEstimate" class="mb-2" style="display:none; padding:1rem; background:#f9fafb; border-radius:8px;">
                    Nights: <strong id="e-nights">0</strong> <br/>
                    Total Cost: <strong id="e-cost" style="color:var(--secondary-color); font-size:1.2rem;">₹0</strong>
                </div>

                <div id="errorMsg" class="mb-1" style="color:var(--badge-danger);"></div>

                <button type="submit" class="btn btn-primary w-100" id="btnSubmit">Confirm Booking</button>
            </form>
        </div>
    </main>
    
    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content text-center">
            <h2 style="color: #059669;" class="mb-1">Booking Confirmed!</h2>
            <p>Your Booking ID is: <strong id="m-bid"></strong></p>
            <p class="mb-2">Total Amount: <strong id="m-amount"></strong></p>
            <a href="#" id="m-payLink" class="btn btn-primary w-100 mb-1">Proceed to Payment</a>
            <a href="bookings.html" class="btn btn-secondary w-100">View Bookings</a>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let roomPrice = 0;
        const params = new URLSearchParams(window.location.search);
        const roomNumber = params.get('roomNumber');
        
        async function loadRoomInfo() {
            if (!roomNumber) {
                alert('No room specified!');
                window.location.href = 'rooms.html';
                return;
            }
            try {
                // Fetch all rooms and find ours
                const rooms = await fetchApi('/rooms');
                const room = rooms.find(r => r.roomNumber === roomNumber);
                if (!room) throw new Error('Room not found');
                
                roomPrice = room.price;
                document.getElementById('b-guests').max = room.capacity;
                document.getElementById('roomInfo').innerHTML = `Room: ${room.roomNumber} - ${room.category} <br/><small style="color:var(--text-light)">(Max capacity: ${room.capacity}, ${formatCurrency(room.price)}/night)</small>`;
                
                // min dates
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('b-checkin').min = today;
                document.getElementById('b-checkout').min = today;
            } catch (err) {
                alert('Invalid room');
            }
        }

        function calculateNights() {
            const cin = new Date(document.getElementById('b-checkin').value);
            const cout = new Date(document.getElementById('b-checkout').value);
            
            if (cin && cout && cout > cin) {
                const diffTime = Math.abs(cout - cin);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                document.getElementById('costEstimate').style.display = 'block';
                document.getElementById('e-nights').innerText = diffDays;
                document.getElementById('e-cost').innerText = formatCurrency(diffDays * roomPrice);
                document.getElementById('errorMsg').innerText = '';
            } else {
                document.getElementById('costEstimate').style.display = 'none';
            }
        }

        async function submitBooking(e) {
            e.preventDefault();
            document.getElementById('errorMsg').innerText = '';
            
            const bBody = {
                roomNumber: roomNumber,
                customerName: document.getElementById('b-name').value,
                email: document.getElementById('b-email').value,
                phoneNumber: document.getElementById('b-phone').value,
                checkInDate: document.getElementById('b-checkin').value,
                checkOutDate: document.getElementById('b-checkout').value,
                guests: parseInt(document.getElementById('b-guests').value)
            };
            
            if(new Date(bBody.checkOutDate) <= new Date(bBody.checkInDate)){
                document.getElementById('errorMsg').innerText = 'Check-out date must be after Check-in date.';
                return;
            }

            try {
                const result = await fetchApi('/bookings', {
                    method: 'POST',
                    body: JSON.stringify(bBody)
                });
                
                document.getElementById('m-bid').innerText = result.bookingId;
                document.getElementById('m-amount').innerText = formatCurrency(result.totalAmount);
                document.getElementById('m-payLink').href = `payment.html?bookingId=${result.bookingId}`;
                
                showModal('successModal');
            } catch(err) {
                document.getElementById('errorMsg').innerText = err.message || 'Validation Failed! Make sure guests are within capacity and dates are valid.';
            }
        }
        
        window.onload = loadRoomInfo;
    </script>
</body>
</html>
