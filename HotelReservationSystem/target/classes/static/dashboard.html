<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Grandeur - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏨 Hotel Grandeur</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms.html">Rooms</a></li>
            <li><a href="bookings.html">My Bookings</a></li>
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="reports.html">Reports</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="mb-2">Admin Dashboard</h1>
        
        <div class="grid" id="statsGrid">
            <!-- Loading --> 
            <div>Loading statistics...</div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        async function loadDashboard() {
            try {
                const stats = await fetchApi('/dashboard');
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="card" style="padding: 2rem; align-items: center;">
                        <h3 style="color: var(--text-light)">Total Rooms</h3>
                        <p style="font-size: 3rem; font-weight: bold; color: var(--primary-color)">${stats.totalRooms}</p>
                    </div>
                    <div class="card" style="padding: 2rem; align-items: center;">
                        <h3 style="color: var(--text-light)">Available Rooms</h3>
                        <p style="font-size: 3rem; font-weight: bold; color: #059669">${stats.availableRooms}</p>
                    </div>
                    <div class="card" style="padding: 2rem; align-items: center;">
                        <h3 style="color: var(--text-light)">Booked Rooms</h3>
                        <p style="font-size: 3rem; font-weight: bold; color: #dc2626">${stats.bookedRooms}</p>
                    </div>
                    <div class="card" style="padding: 2rem; align-items: center;">
                        <h3 style="color: var(--text-light)">Total Bookings</h3>
                        <p style="font-size: 3rem; font-weight: bold; color: var(--primary-color)">${stats.totalBookings}</p>
                    </div>
                    <div class="card" style="padding: 2rem; align-items: center; grid-column: 1 / -1;">
                        <h3 style="color: var(--text-light)">Total Revenue</h3>
                        <p style="font-size: 4rem; font-weight: bold; color: var(--secondary-color)">
                            ${formatCurrency(stats.totalRevenue)}
                        </p>
                    </div>
                `;
            } catch (err) {
                document.getElementById('statsGrid').innerHTML = `<div class="badge badge-danger">Failed to load stats.</div>`;
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
