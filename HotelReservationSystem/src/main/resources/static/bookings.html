<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Grandeur - Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏨 Hotel Grandeur</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms.html">Rooms</a></li>
            <li><a href="bookings.html" class="active">My Bookings</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <main>
        <div style="display:flex; justify-content:space-between; align-items:center;" class="mb-2">
            <h1>All Bookings</h1>
            <div style="width:300px;">
                <input type="text" id="searchInput" placeholder="Search by ID or Customer Name" onkeyup="if(event.key === 'Enter') search()">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Customer</th>
                        <th>Room</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Payment</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookingsTable">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        async function loadBookings(query = '') {
            try {
                let url = '/bookings';
                if(query) url += `?search=${query}`;
                
                const data = await fetchApi(url);
                const tb = document.getElementById('bookingsTable');
                
                if(data.length === 0){
                    tb.innerHTML = '<tr><td colspan="9" class="text-center">No bookings found.</td></tr>';
                    return;
                }
                
                tb.innerHTML = data.map(b => `
                    <tr>
                        <td><strong>${b.bookingId}</strong></td>
                        <td>${b.customerName}</td>
                        <td>${b.roomNumber} (${b.category})</td>
                        <td>${formatDate(b.checkInDate)}</td>
                        <td>${formatDate(b.checkOutDate)}</td>
                        <td>${formatCurrency(b.totalAmount)}</td>
                        <td>
                            <span class="badge ${b.bookingStatus==='CONFIRMED' ? 'badge-success' : 'badge-danger'}">
                                ${b.bookingStatus}
                            </span>
                        </td>
                        <td>
                             <span class="badge ${b.paymentStatus==='PAID' ? 'badge-success' : 'badge-warning'}">
                                ${b.paymentStatus}
                            </span>
                            ${b.paymentStatus === 'PENDING' && b.bookingStatus === 'CONFIRMED' ? 
                                `<br><a href="payment.html?bookingId=${b.bookingId}" style="font-size:0.8rem;text-decoration:none;">Pay Now</a>` : ''}
                        </td>
                        <td>
                            ${b.bookingStatus === 'CONFIRMED' ? 
                                `<button onclick="cancelBooking('${b.bookingId}')" class="btn btn-secondary" style="padding:0.4rem 0.8rem;font-size:0.8rem">Cancel</button>` 
                             : '-'}
                        </td>
                    </tr>
                `).join('');
                
            } catch(e) {
                document.getElementById('bookingsTable').innerHTML = '<tr><td colspan="9" style="color:red">Error loading bookings.</td></tr>';
            }
        }
        
        function search() {
            const s = document.getElementById('searchInput').value;
            loadBookings(s);
        }

        async function cancelBooking(id) {
            if(confirm('Are you sure you want to cancel booking ' + id + '?')) {
                try {
                    await fetchApi(`/bookings/cancel/${id}`, { method: 'PUT' });
                    alert('Booking cancelled successfully.');
                    loadBookings();
                } catch(e) {
                    alert('Failed to cancel: ' + e.message);
                }
            }
        }

        window.onload = () => loadBookings();
    </script>
</body>
</html>
