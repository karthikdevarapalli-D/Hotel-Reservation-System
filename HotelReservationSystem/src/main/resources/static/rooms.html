<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Grandeur - Rooms</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏨 Hotel Grandeur</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms.html" class="active">Rooms</a></li>
            <li><a href="bookings.html">My Bookings</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="mb-2">Available Rooms</h1>
        
        <div class="filter-bar">
            <div class="filter-group">
                <label>Category</label>
                <select id="f-category">
                    <option value="">All Categories</option>
                    <option value="STANDARD">Standard</option>
                    <option value="DELUXE">Deluxe</option>
                    <option value="SUITE">Suite</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Max Price (₹)</label>
                <input type="number" id="f-price" placeholder="e.g. 5000">
            </div>
            <div class="filter-group">
                <label>Min Capacity</label>
                <input type="number" id="f-capacity" placeholder="Guests">
            </div>
            <div class="filter-group">
                <label>Availability</label>
                <select id="f-available">
                    <option value="true">Available Only</option>
                    <option value="">All Rooms</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="loadRooms()" style="margin-top: 1.5rem;">Search</button>
        </div>

        <div class="grid" id="roomsList">
            <!-- Loader -->
            <div>Loading rooms...</div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        async function loadRooms() {
            const cat = document.getElementById('f-category').value;
            const pr = document.getElementById('f-price').value;
            const cap = document.getElementById('f-capacity').value;
            const avail = document.getElementById('f-available').value;
            
            let query = '?';
            if (cat) query += `category=${cat}&`;
            if (pr) query += `maxPrice=${pr}&`;
            if (cap) query += `capacity=${cap}&`;
            if (avail) query += `availableOnly=${avail}`;
            
            try {
                const rooms = await fetchApi(`/rooms/search${query}`);
                const container = document.getElementById('roomsList');
                
                if (rooms.length === 0) {
                    container.innerHTML = '<h3>No rooms found matching your criteria.</h3>';
                    return;
                }
                
                container.innerHTML = rooms.map(room => `
                    <div class="card">
                        <div class="card-img" style="background-image: url('${room.image}');"></div>
                        <div class="card-body">
                            <div style="display:flex; justify-content: space-between; align-items:center;">
                                <h3 class="card-title">Room ${room.roomNumber}</h3>
                                <div class="badge ${room.available ? 'badge-success' : 'badge-danger'}">
                                    ${room.available ? 'Available' : 'Booked'}
                                </div>
                            </div>
                            <p class="mb-1" style="color:var(--text-light)">Category: <strong>${room.category}</strong></p>
                            <p class="mb-1" style="color:var(--text-light)">Capacity: <strong>${room.capacity} Guests</strong></p>
                            <p class="card-price">${formatCurrency(room.price)} <small style="font-size:1rem;font-weight:normal;color:var(--text-light)">/ night</small></p>
                            
                            <a href="booking.html?roomNumber=${room.roomNumber}" class="btn btn-primary w-100 text-center" 
                               ${!room.available ? 'style="pointer-events:none; opacity:0.5;"' : ''}>
                                ${room.available ? 'Book Now' : 'Unavailable'}
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('roomsList').innerHTML = `<div class="badge badge-danger">Failed to load rooms.</div>`;
            }
        }
        
        // Pick category from URL if present
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('category');
            if (cat) {
                document.getElementById('f-category').value = cat;
            }
            loadRooms();
        };
    </script>
</body>
</html>
